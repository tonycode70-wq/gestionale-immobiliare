name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Supabase
        run: |
          curl -i -X GET "https://[IL-TUO-ID-PROGETTO].supabase.co/rest/v1/[gestionale-immobiliare]?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
